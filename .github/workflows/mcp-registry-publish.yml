name: Publish to MCP registry

# Publishes server.json to registry.modelcontextprotocol.io via GitHub OIDC —
# no interactive login or secrets needed. Runs whenever server.json changes on
# main (i.e. version bumps); the npm package for that version must already be
# live, since the registry validates the tarball's mcpName.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - server.json
      - .github/workflows/mcp-registry-publish.yml

permissions:
  contents: read
  id-token: write # OIDC token for the io.github.selic/* namespace

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" | tar xz mcp-publisher

      - name: Publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Verify
        run: |
          name=$(node -p "require('./server.json').name")
          version=$(node -p "require('./server.json').version")
          listed=$(curl -s "https://registry.modelcontextprotocol.io/v0/servers?search=$name&version=latest" \
            | node -p "JSON.parse(require('fs').readFileSync(0)).servers.map(s => s.version ?? s.server?.version).join(',')")
          echo "registry has: $listed (want $version)"
          [ "$listed" = "$version" ]
